name: Retell AI Snapshot Collector

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:        # Manual trigger for testing

permissions:
  contents: write

jobs:
  collect-snapshots:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build

      - name: Fetch snapshots-archive branch
        run: |
          git fetch origin snapshots-archive:snapshots-archive || echo "snapshots-archive branch does not exist yet"
          git checkout snapshots-archive 2>/dev/null || git checkout -b snapshots-archive
          git checkout main

      - name: Run snapshot collector
        env:
          RETELL_API_KEY: ${{ secrets.RETELL_API_KEY }}
        run: npm run snapshot-collect 2>&1 | tee snapshot-output.log | tail -n 20

      - name: Extract JSON summary
        run: |
          # Extract JSON between "📊 Summary:" and the closing brace
          sed -n '/📊 Summary:/,/^}$/p' snapshot-output.log | tail -n +2 > snapshot-summary.json
          cat snapshot-summary.json

      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n $(git status --porcelain snapshots/) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            TOTAL_NEW=$(jq -r '.totalNew' snapshot-summary.json)
            echo "total_new=$TOTAL_NEW" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config user.name "Retell Snapshot Bot"
          git config user.email "bot@github-actions"

          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          TOTAL_NEW="${{ steps.check_changes.outputs.total_new }}"

          # Copy snapshots to temp location
          TEMP_SNAPSHOTS=$(mktemp -d)
          cp -r snapshots/* "$TEMP_SNAPSHOTS/"

          # Discard local changes and switch to snapshots-archive branch
          git checkout -- snapshots/
          git checkout snapshots-archive

          # Copy snapshots back
          cp -r "$TEMP_SNAPSHOTS"/* snapshots/

          # Commit and push
          git add snapshots/
          git commit -m "Snapshot update: $TIMESTAMP - $TOTAL_NEW new versions"
          git push origin snapshots-archive

          # Cleanup
          rm -rf "$TEMP_SNAPSHOTS"

      - name: Send Slack notification
        if: steps.check_changes.outputs.changes == 'true' && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          TOTAL_NEW="${{ steps.check_changes.outputs.total_new }}"

          # Build detailed change list
          CHANGES=$(jq -r '
            (.flows // [] | map("• Flow `\(.id)`: v\(.oldVersion) → v\(.newVersion)")) +
            (.agents // [] | map("• Agent `\(.id)`: v\(.oldVersion) → v\(.newVersion)")) +
            (.components // [] | map("• Component `\(.id)`: v\(.oldVersion) → v\(.newVersion)"))
            | join("\\n")
          ' snapshot-summary.json)

          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d @- <<EOF
          {
            "text": "🔔 Retell AI Snapshots Updated",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "📸 New Retell AI Snapshots"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Timestamp:*\\n${TIMESTAMP}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Total Changes:*\\n${TOTAL_NEW} new versions"
                  }
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Updated Resources:*\\n${CHANGES}"
                }
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "View Changes"
                    },
                    "url": "https://github.com/${{ github.repository }}/commit/${COMMIT_SHA}"
                  }
                ]
              }
            ]
          }
          EOF

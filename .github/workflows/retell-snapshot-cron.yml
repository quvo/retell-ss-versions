name: Retell AI Snapshot Collector

on:
  schedule:
    - cron: '7,22,37,52 * * * *'  # Every 15 minutes (avoid peak times at :00, :05, etc)
  workflow_dispatch:        # Manual trigger for testing

permissions:
  contents: write

jobs:
  collect-snapshots:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build

      - name: Fetch snapshots-archive branch and restore index files
        run: |
          git fetch origin snapshots-archive:snapshots-archive || echo "snapshots-archive branch does not exist yet"

          # Create snapshots directory structure
          mkdir -p snapshots/flows snapshots/agents snapshots/components

          # Get existing index files from snapshots-archive branch
          git show snapshots-archive:snapshots/flows/index.json > snapshots/flows/index.json 2>/dev/null || echo '{}' > snapshots/flows/index.json
          git show snapshots-archive:snapshots/agents/index.json > snapshots/agents/index.json 2>/dev/null || echo '{}' > snapshots/agents/index.json
          git show snapshots-archive:snapshots/components/index.json > snapshots/components/index.json 2>/dev/null || echo '{}' > snapshots/components/index.json

          echo "Restored index files from snapshots-archive branch"

      - name: Run snapshot collector
        env:
          RETELL_API_KEY: ${{ secrets.RETELL_API_KEY }}
        run: npm run snapshot-collect 2>&1 | tee snapshot-output.log | tail -n 20

      - name: Extract JSON summary
        run: |
          # Extract JSON between "📊 Summary:" and the closing brace
          sed -n '/📊 Summary:/,/^}$/p' snapshot-output.log | tail -n +2 > snapshot-summary.json
          cat snapshot-summary.json

      - name: Check for changes
        id: check_changes
        run: |
          TOTAL_NEW=$(jq -r '.totalNew' snapshot-summary.json)
          echo "total_new=$TOTAL_NEW" >> $GITHUB_OUTPUT

          if [[ "$TOTAL_NEW" -gt 0 ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "✓ Changes detected: $TOTAL_NEW new versions"
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "✓ No changes detected"
          fi

      - name: Create PR with snapshot changes
        if: steps.check_changes.outputs.changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Retell Snapshot Bot"
          git config user.email "bot@github-actions"

          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          TIMESTAMP_BRANCH=$(date -u +"%Y%m%d-%H%M%S")
          TOTAL_NEW="${{ steps.check_changes.outputs.total_new }}"
          BRANCH_NAME="snapshot-updates/${TIMESTAMP_BRANCH}"

          # Copy snapshots to temp location
          TEMP_SNAPSHOTS=$(mktemp -d)
          cp -r snapshots/* "$TEMP_SNAPSHOTS/"

          # Discard local changes and switch to snapshots-archive branch
          git checkout -- snapshots/
          git fetch origin snapshots-archive:snapshots-archive
          git checkout snapshots-archive

          # Create new feature branch from snapshots-archive
          git checkout -b "$BRANCH_NAME"

          # Copy snapshots back
          cp -r "$TEMP_SNAPSHOTS"/* snapshots/

          # Commit and push to feature branch
          git add snapshots/
          git commit -m "Snapshot update: $TIMESTAMP - $TOTAL_NEW new versions"
          git push origin "$BRANCH_NAME"

          # Create PR
          gh pr create \
            --base snapshots-archive \
            --head "$BRANCH_NAME" \
            --title "📸 Snapshot update: $TIMESTAMP" \
            --body "$(cat <<EOF
          ## Summary
          Automated snapshot collection detected **$TOTAL_NEW new versions**.

          ## Changes
          $(jq -r '
            (.flows // [] | map("- Flow \`\(.id)\`: v\(.oldVersion) → v\(.newVersion)")) +
            (.agents // [] | map("- Agent \`\(.id)\`: v\(.oldVersion) → v\(.newVersion)")) +
            (.components // [] | map("- Component \`\(.id)\`: checksum updated"))
            | join("\n")
          ' snapshot-summary.json)

          ## Details
          - **Timestamp**: $TIMESTAMP
          - **Total new versions**: $TOTAL_NEW
          - **Trigger**: GitHub Actions scheduled run

          🤖 Generated by [Retell Snapshot Collector](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF
          )"

          # Auto-merge PR (squash merge)
          PR_NUMBER=$(gh pr list --head "$BRANCH_NAME" --json number --jq '.[0].number')
          gh pr merge "$PR_NUMBER" --squash --auto

          # Cleanup
          rm -rf "$TEMP_SNAPSHOTS"

      - name: Send Slack notification
        if: steps.check_changes.outputs.changes == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -z "$SLACK_WEBHOOK_URL" ]]; then
            echo "⚠️ SLACK_WEBHOOK_URL not configured, skipping notification"
            exit 0
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          TIMESTAMP_BRANCH=$(date -u +"%Y%m%d-%H%M%S")
          TOTAL_NEW="${{ steps.check_changes.outputs.total_new }}"
          BRANCH_NAME="snapshot-updates/${TIMESTAMP_BRANCH}"

          # Get PR URL
          PR_URL=$(gh pr list --head "$BRANCH_NAME" --json url --jq '.[0].url')

          # Build detailed change list
          CHANGES=$(jq -r '
            (.flows // [] | map("• Flow `\(.id)`: v\(.oldVersion) → v\(.newVersion)")) +
            (.agents // [] | map("• Agent `\(.id)`: v\(.oldVersion) → v\(.newVersion)")) +
            (.components // [] | map("• Component `\(.id)`: checksum updated"))
            | join("\\n")
          ' snapshot-summary.json)

          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d @- <<EOF
          {
            "text": "🔔 Retell AI Snapshots Updated",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "📸 New Retell AI Snapshots"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Timestamp:*\\n${TIMESTAMP}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Total Changes:*\\n${TOTAL_NEW} new versions"
                  }
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Updated Resources:*\\n${CHANGES}"
                }
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "View Pull Request"
                    },
                    "url": "${PR_URL}"
                  }
                ]
              }
            ]
          }
          EOF
